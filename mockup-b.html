<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup B — Background Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0b0c;
  color: #e8e4e5;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Hero with background image ── */
.hero {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 60px 32px 80px;
  position: relative;
  overflow: hidden;
}

/* Background image */
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    url('https://images.unsplash.com/photo-1550345332-09e3ac987658?w=1400&q=80&auto=format')
    center 30% / cover no-repeat;
  z-index: 0;
}

/* Dark gradient overlay — heavier at bottom for text readability */
.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(13, 11, 12, 0.3) 0%,
      rgba(13, 11, 12, 0.5) 40%,
      rgba(13, 11, 12, 0.85) 70%,
      rgba(13, 11, 12, 1) 100%
    );
}

.hero-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  max-width: 800px;
  gap: 20px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 120px;
  letter-spacing: 16px;
  line-height: 1;
  margin-bottom: 8px;
}

.logo .k { color: #c49098; }
.logo .rest { color: #e8e4e5; }

.headline {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 400;
  line-height: 1.2;
  white-space: nowrap;
}

.headline em {
  font-style: italic;
  color: #c49098;
}

.subline {
  font-size: 17px;
  line-height: 1.7;
  color: #9a9294;
  max-width: 460px;
}

.cta-group {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.cta-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  border: 1px solid rgba(196, 144, 152, 0.3);
  border-radius: 100px;
  color: #e8e4e5;
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.5px;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
  background: rgba(13, 11, 12, 0.3);
}

.cta-link:hover {
  border-color: #c49098;
  color: #c49098;
  box-shadow: 0 0 30px rgba(196, 144, 152, 0.1);
}

.cta-link svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  transition: transform 0.3s ease;
}

.cta-link:hover svg {
  transform: translateX(3px);
}

.or-join {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #4a4345;
}

.waitlist-mini {
  display: flex;
  border-radius: 100px;
  overflow: hidden;
  border: 1px solid #1e1a1b;
  background: rgba(19, 16, 17, 0.8);
  backdrop-filter: blur(10px);
  max-width: 340px;
  width: 100%;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.waitlist-mini:focus-within {
  border-color: rgba(196, 144, 152, 0.3);
  box-shadow: 0 0 30px rgba(196, 144, 152, 0.08);
}

.waitlist-mini input {
  flex: 1;
  padding: 12px 20px;
  background: transparent;
  border: none;
  color: #e8e4e5;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 300;
  outline: none;
  min-width: 0;
}

.waitlist-mini input::placeholder { color: #4a4345; }

.waitlist-mini button {
  padding: 12px 22px;
  background: #c49098;
  border: none;
  color: #0d0b0c;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
  letter-spacing: 0.5px;
  border-radius: 0 100px 100px 0;
}

.waitlist-mini button:hover { background: #d4a5ad; }

/* ── Label ── */
.mockup-label {
  position: fixed;
  top: 16px;
  left: 16px;
  background: #c49098;
  color: #0d0b0c;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  z-index: 100;
}

@media (max-width: 640px) {
  .logo { font-size: 80px; letter-spacing: 10px; }
  .headline { font-size: 28px; white-space: normal; }
  .hero { padding: 40px 20px 60px; }
}
</style>
</head>
<body>

<div class="mockup-label">Option B — Background Image</div>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="logo">
      <span class="k">K</span><span class="rest">INĒ</span>
    </div>

    <h1 class="headline">You show up. <em>We'll take it from here.</em></h1>

    <p class="subline">
      An intelligent training programme for women — so you don't have to figure it out alone.
    </p>

    <div class="cta-group">
      <a href="#" class="cta-link">
        See how it works
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
      <span class="or-join">or join the waitlist</span>
      <form class="waitlist-mini" onsubmit="return false">
        <input type="email" placeholder="your@email.com">
        <button type="submit">Join</button>
      </form>
    </div>
  </div>
</section>

</body>
</html>
